<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erro</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 50px;
      color: #ff4b2b;
      margin-bottom: 10px;
    }

    h2 {
      color: #333;
      margin-bottom: 10px;
    }

    p {
      color: #777;
      margin-bottom: 20px;
    }

    .error-box {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      color: #999;
      margin-bottom: 20px;
      word-break: break-word;
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 8px;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>500</h1>
    <h2>Ops, algo deu errado!</h2>
    <p>Ocorreu um erro ao processar sua solicitação.</p>

    <!-- 🔥 mensagem dinâmica do errorHandler -->
    <div class="error-box">
      <%= error || "Erro desconhecido" %>
    </div>

    <a href="/contacts">Voltar</a>
  </div>
</body>
</html>
