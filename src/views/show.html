<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalhes do contato</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
      }

      .container {
        background: #fff;
        padding: 35px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      header {
        text-align: center;
        margin-bottom: 20px;
      }

      header h2 {
        color: #333;
      }

      .info {
        margin-bottom: 20px;
      }

      .info p {
        margin-bottom: 10px;
        color: #555;
      }

      .info label {
        font-weight: bold;
        color: #333;
        margin-right: 5px;
      }

      .actions {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #ff4d4d;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        opacity: 0.9;
        transform: scale(1.03);
      }

      .edit {
        flex: 1;
        text-align: center;
        padding: 10px;
        border-radius: 8px;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }

      .edit:hover {
        opacity: 0.9;
        transform: scale(1.03);
      }

      .back {
        margin-top: 15px;
        text-align: center;
      }

      .back a {
        text-decoration: none;
        color: #2575fc;
        font-weight: bold;
      }

      .back a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <h2>Dados do contato</h2>
      </header>

      <section>
        <div class="info">
          <p><label>Nome:</label> <%- contact.name %></p>
          <p><label>E-mail:</label> <%- contact.email %></p>
        </div>

        <form action="/contacts/<%- id %>" method="post">
          <input type="hidden" name="_method" value="delete" />

          <div class="actions">
            <button type="submit">Excluir</button>
            <a class="edit" href="/contacts/<%- id %>/edit">Editar</a>
          </div>
        </form>

        <div class="back">
          <a href="/contacts">← Voltar</a>
        </div>
      </section>
    </div>
  </body>
</html>
