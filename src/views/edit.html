<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar contato</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
      }

      .container {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      header {
        text-align: center;
        margin-bottom: 20px;
      }

      header h2 {
        color: #333;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      label {
        font-size: 14px;
        color: #555;
      }

      input {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
      }

      input:focus {
        border-color: #6a11cb;
        box-shadow: 0 0 5px rgba(106, 17, 203, 0.3);
      }

      button {
        margin-top: 10px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        opacity: 0.9;
        transform: scale(1.03);
      }

      .back {
        margin-top: 15px;
        text-align: center;
      }

      .back a {
        text-decoration: none;
        color: #2575fc;
        font-weight: bold;
      }

      .back a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <h2>Editar contato</h2>
      </header>

      <section>
        <form action="/contacts/<%- id %>" method="post">
          <input type="hidden" name="_method" value="put" />

          <label>name:</label>
          <input
            type="text"
            name="contacts[name]"
            value="<%- contact.name %>"
            required
          />

          <label>E-mail:</label>
          <input
            type="email"
            name="contacts[email]"
            value="<%- contato.email %>"
            required
          />

          <button type="submit">Atualizar</button>
        </form>

        <div class="back">
          <a href="/contacts">← Voltar</a>
        </div>
      </section>
    </div>
  </body>
</html>
