<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatIOtalk</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 350px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      header h1 {
        color: #333;
        margin-bottom: 10px;
      }

      header h4 {
        color: #777;
        margin-bottom: 25px;
        font-weight: normal;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      input {
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
      }

      input:focus {
        border-color: #6a11cb;
        box-shadow: 0 0 5px rgba(106, 17, 203, 0.3);
      }

      button {
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        opacity: 0.9;
        transform: scale(1.02);
      }

      footer {
        margin-top: 20px;
        color: #999;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <h1>ChatIOtalk</h1>
        <h4>Welcome to ChatIOtalk!</h4>
      </header>

      <section>
        <form action="/login" method="post">
          <input type="text" name="user[name]" placeholder="Digite o nome" required />

          <input 
            type="email"
            name="user[email]"
            placeholder="Digite o e-mail"
            required
          />

          <button type="submit">Entrar</button>
        </form>
      </section>

      <footer>
        <small>ChatIOtalk - Agenda de contatos</small>
      </footer>
    </div>
  </body>
</html>
